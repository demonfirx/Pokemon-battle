<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Pokémon Battle</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect to external origins for faster resource loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>

  <!-- Preload Google Font CSS -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"></noscript>

  <!-- Critical CSS: loading screen styles inlined for instant render -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-darker: #0f0f23; --text-secondary: #a0a0b0; --accent: #e94560; --font-pixel: 'Press Start 2P', monospace; }
    body { font-family: var(--font-pixel); background: var(--bg-darker); color: #eaeaea; min-height: 100vh; overflow: hidden; }
    .screen { display: none; position: fixed; inset: 0; z-index: 1; }
    .screen.active { display: flex; align-items: center; justify-content: center; }
    #loading-screen { background: var(--bg-darker); flex-direction: column; gap: 2rem; }
    .loading-content { text-align: center; }
    .pokeball-loader { display: flex; justify-content: center; margin-bottom: 2rem; }
    .pokeball { width: 80px; height: 80px; position: relative; animation: pokeball-bounce 1s ease-in-out infinite; }
    .pokeball-top { width: 80px; height: 40px; background: var(--accent); border-radius: 40px 40px 0 0; border: 4px solid #333; border-bottom: none; }
    .pokeball-bottom { width: 80px; height: 40px; background: #eee; border-radius: 0 0 40px 40px; border: 4px solid #333; border-top: none; }
    .pokeball-center { width: 80px; height: 8px; background: #333; position: relative; z-index: 2; }
    .pokeball-center::after { content: ''; position: absolute; width: 24px; height: 24px; background: #eee; border: 4px solid #333; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    @keyframes pokeball-bounce { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-20px) rotate(-10deg); } 50% { transform: translateY(0) rotate(0deg); } 75% { transform: translateY(-10px) rotate(5deg); } }
    .loading-text { font-size: 0.8rem; color: var(--text-secondary); letter-spacing: 2px; }
    .dots { animation: dots-blink 1.5s steps(4) infinite; }
    @keyframes dots-blink { 0% { opacity: 0.2; } 25% { opacity: 0.4; } 50% { opacity: 0.7; } 75% { opacity: 1; } }
  </style>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ===== LOADING SCREEN ===== -->
  <div id="loading-screen" class="screen active">
    <div class="loading-content">
      <div class="pokeball-loader">
        <div class="pokeball">
          <div class="pokeball-top"></div>
          <div class="pokeball-center"></div>
          <div class="pokeball-bottom"></div>
        </div>
      </div>
      <p class="loading-text">Loading<span class="dots">...</span></p>
    </div>
  </div>

  <!-- ===== SELECT SCREEN ===== -->
  <div id="select-screen" class="screen">
    <div class="select-container">
      <h1 class="title">POKÉMON BATTLE</h1>
      <p class="subtitle">Choose your Pokémon!</p>
      <div id="pokemon-roster" class="pokemon-grid">
        <!-- Pokemon cards injected by JS -->
      </div>
      <div class="select-footer">
        <div id="selected-preview" class="selected-preview hidden">
          <img id="selected-sprite" src="" alt="" width="64" height="64" decoding="async">
          <div class="selected-info">
            <span id="selected-name"></span>
            <div id="selected-types" class="selected-types"></div>
          </div>
          <button id="btn-battle" class="btn-battle">BATTLE!</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== BATTLE SCREEN ===== -->
  <div id="battle-screen" class="screen">
    <div class="battle-container">
      <!-- Battle Arena -->
      <div class="battle-arena" id="battle-arena">
        <!-- Turn order indicator -->
        <div id="turn-order-indicator" class="turn-order-indicator hidden"></div>

        <!-- Opponent (top-right) -->
        <div class="pokemon-slot opponent-slot">
          <div class="pokemon-info-bar opponent-bar">
            <div class="pokemon-name-row">
              <span id="opponent-name" class="pokemon-label"></span>
              <span id="opponent-status-badge" class="status-badge hidden"></span>
              <span id="opponent-level" class="pokemon-level">Lv50</span>
            </div>
            <div id="opponent-type-badges" class="battle-type-badges"></div>
            <div class="hp-container">
              <span class="hp-label">HP</span>
              <div class="hp-bar-bg">
                <div id="opponent-hp-bar" class="hp-bar-fill" style="width:100%"></div>
              </div>
            </div>
            <div class="hp-text-row">
              <span id="opponent-hp-text" class="hp-text"></span>
            </div>
            <div class="stat-stages" id="opponent-stat-stages"></div>
          </div>
          <div class="pokemon-sprite-container opponent-sprite-container">
            <div class="platform opponent-platform"></div>
            <img id="opponent-sprite" class="pokemon-sprite opponent-sprite" src="" alt="" width="140" height="140" decoding="async" fetchpriority="high">
            <div id="opponent-damage-number" class="damage-number hidden"></div>
          </div>
        </div>

        <!-- Player (bottom-left) -->
        <div class="pokemon-slot player-slot">
          <div class="pokemon-sprite-container player-sprite-container">
            <div class="platform player-platform"></div>
            <img id="player-sprite" class="pokemon-sprite player-sprite" src="" alt="" width="140" height="140" decoding="async" fetchpriority="high">
            <div id="player-damage-number" class="damage-number hidden"></div>
          </div>
          <div class="pokemon-info-bar player-bar">
            <div class="pokemon-name-row">
              <span id="player-name" class="pokemon-label"></span>
              <span id="player-status-badge" class="status-badge hidden"></span>
              <span id="player-level" class="pokemon-level">Lv50</span>
            </div>
            <div id="player-type-badges" class="battle-type-badges"></div>
            <div class="hp-container">
              <span class="hp-label">HP</span>
              <div class="hp-bar-bg">
                <div id="player-hp-bar" class="hp-bar-fill" style="width:100%"></div>
              </div>
            </div>
            <div class="hp-text-row">
              <span id="player-hp-text" class="hp-text"></span>
            </div>
            <div class="pp-container">
              <span class="pp-label">PP</span>
              <div class="pp-bar-bg">
                <div id="player-pp-bar" class="pp-bar-fill" style="width:100%"></div>
              </div>
            </div>
            <div class="pp-text-row">
              <span id="player-pp-text" class="pp-text"></span>
            </div>
            <div class="stat-stages" id="player-stat-stages"></div>
          </div>
        </div>
      </div>

      <!-- Message Box -->
      <div class="message-box">
        <p id="battle-message" class="battle-message-text">What will you do?</p>
      </div>

      <!-- Battle Log -->
      <div id="battle-log" class="battle-log">
        <div class="battle-log-header">
          <span>Battle Log</span>
          <button id="toggle-log" class="toggle-log-btn">▼</button>
        </div>
        <div id="battle-log-content" class="battle-log-content"></div>
      </div>

      <!-- Action Panel -->
      <div id="action-panel" class="action-panel">
        <div id="move-buttons" class="move-grid">
          <!-- Move buttons injected by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div id="result-screen" class="screen">
    <div class="result-container">
      <div id="result-sprite-container" class="result-sprite-container">
        <img id="result-sprite" class="result-sprite" src="" alt="" width="160" height="160" decoding="async" loading="lazy">
      </div>
      <h1 id="result-title" class="result-title"></h1>
      <p id="result-message" class="result-message"></p>
      <button id="btn-play-again" class="btn-battle btn-play-again">PLAY AGAIN</button>
    </div>
  </div>

  <!-- Flash overlay for attack animations -->
  <div id="flash-overlay" class="flash-overlay hidden"></div>

  <!-- Effectiveness popup overlay -->
  <div id="effectiveness-popup" class="effectiveness-popup hidden"></div>

  <!-- Floating status text -->
  <div id="floating-status-text" class="floating-status-text hidden"></div>

  <script src="js/perf.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/api.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
